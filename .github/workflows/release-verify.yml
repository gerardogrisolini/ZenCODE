name: Release verification

# Verifies the immutable version contract when a release tag is pushed.
#
# A tag `vX.Y.Z` must match `ZenPackageMetadata.version` in
# Sources/ZenPackageMetadata/ZenPackageMetadata.swift. This workflow ONLY
# verifies; it does not publish, push, or create a GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to verify, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-tag-version:
    name: verify tag matches ZenPackageMetadata.version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag version matches package metadata
        env:
          # Prefer the pushed tag; fall back to the manual dispatch input.
          RELEASE_REF: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -eu

          tag="${DISPATCH_TAG:-$RELEASE_REF}"
          if [ -z "$tag" ]; then
            echo "::error::No tag provided to verify." >&2
            exit 1
          fi

          # Accept only vX.Y.Z (strict semver core, no pre-release/build here).
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${tag}' is not of the form vX.Y.Z." >&2
            exit 1
          fi
          tag_version="${tag#v}"

          metadata_file="Sources/ZenPackageMetadata/ZenPackageMetadata.swift"
          # Extract the string literal from: public static let version = "X.Y.Z"
          metadata_version="$(
            sed -n 's/.*static let version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' \
              "$metadata_file" | head -n1
          )"

          if [ -z "$metadata_version" ]; then
            echo "::error::Could not read version from ${metadata_file}." >&2
            exit 1
          fi

          echo "Tag version:      ${tag_version}"
          echo "Metadata version: ${metadata_version}"

          if [ "$tag_version" != "$metadata_version" ]; then
            echo "::error::Tag ${tag} does not match ZenPackageMetadata.version (${metadata_version}). Update the metadata or the tag." >&2
            exit 1
          fi

          echo "Version contract verified: ${tag} == ZenPackageMetadata.version ${metadata_version}."
